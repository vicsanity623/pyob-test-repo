<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Axiom | UAP Ledger</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="referrer" content="no-referrer">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');

        :root {
            --bg-color: #050505;
            --surface-color: #141414;
            --hover-color: #222;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --accent-color: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .status-bar-bg {
            display: block;
            width: 100%;
            position: sticky;
            top: 0;
            height: calc(env(safe-area-inset-top) + 20px);
            background-color: #000;
            z-index: 100;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: sticky;
            top: calc(env(safe-area-inset-top) + 20px);
            height: 60px;
            background-color: var(--bg-color);
            z-index: 90;
            border-bottom: 1px solid #1f1f1f;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            background: #111;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }

        .search-bar {
            display: flex;
            flex: 0 1 600px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            margin: 0 20px;
        }

        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 10px 20px;
            font-size: 14px;
            outline: none;
        }

        .search-bar button {
            background-color: #1a1a1a;
            border: none;
            border-left: 1px solid #333;
            padding: 0 20px;
            color: var(--accent-color);
            cursor: pointer;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 240px;
            background-color: var(--bg-color);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
            border-right: 1px solid #111;
        }

        .sidebar-item {
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: var(--surface-color);
            color: var(--accent-color);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            background-color: var(--bg-color);
            padding: 20px;
            padding-bottom: calc(40px + env(safe-area-inset-bottom));
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: pointer;
            position: relative;
            background: var(--surface-color);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #222;
            transition: border 0.2s;
        }

        .card:hover {
            border-color: var(--accent-color);
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 4px;
            background-color: #111;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .media-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #333;
            text-transform: uppercase;
        }

        .menu-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: 0.2s;
        }

        .menu-btn:hover {
            background: var(--accent-color);
            color: black;
        }

        .card-title {
            font-weight: 700;
            font-size: 14px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        /* WATCH VIEW */
        .watch-container {
            display: none;
            flex-direction: column;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .media-player-wrapper {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            max-height: 70vh;
            position: relative;
        }

        .media-player-wrapper video,
        .media-player-wrapper img {
            max-width: 100%;
            max-height: 65vh;
            object-fit: contain;
            display: block;
        }

        .audio-status {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid #333;
            color: var(--accent-color);
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .post-details {
            background: var(--surface-color);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #222;
        }

        .post-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .post-meta {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .post-body {
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
        }

        .btn:hover {
            background: #222;
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .crypto-box {
            background: #0a0a0a;
            border-left: 2px solid var(--accent-color);
            padding: 15px;
            border-radius: 0 4px 4px 0;
            margin-top: 20px;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            color: #666;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="status-bar-bg"></div>

    <header>
        <div class="logo" onclick="closeWatchView()">
            <div class="logo-icon">🛸</div>
            <span>AXIOM <span style="font-weight:400; color:var(--text-secondary)">UAP</span></span>
        </div>
        <form class="search-bar" action="javascript:void(0);" onsubmit="applyFilters(); return false;">
            <input type="search" id="searchInput" placeholder="Search sightings, locations, keywords..."
                enterkeyhint="search">
            <button type="submit">SEARCH</button>
        </form>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-item active" onclick="setCategory('All')">🌐 Global Feed</div>
            <div class="sidebar-item" onclick="setCategory('Reddit')">👽 Reddit Comm</div>
            <div class="sidebar-item" onclick="setCategory('4chan')">🍀 4chan /x/</div>
            <div style="border-top: 1px solid #222; margin: 10px 0;"></div>
            <div class="sidebar-item" onclick="setCategory('Saved')">📁 Saved Files</div>
        </aside>

        <main class="content">
            <div class="filters" style="margin-bottom: 10px; border-bottom: 1px solid #111; padding-bottom: 15px;">
                <div style="display:flex; flex-direction:column; gap:10px; width:100%;">
                    <div style="display:flex; gap:10px; overflow-x:auto;">
                        <span
                            style="font-size:10px; color:var(--accent-color); align-self:center; font-weight:bold; letter-spacing:1px;">SORT:</span>
                        <button class="filter-chip active" id="sort-recent" onclick="setSort('recent')">RECENT</button>
                        <button class="filter-chip" id="sort-popular" onclick="setSort('popular')">POPULAR</button>
                    </div>
                    <div style="display:flex; gap:10px; overflow-x:auto;">
                        <span
                            style="font-size:10px; color:var(--accent-color); align-self:center; font-weight:bold; letter-spacing:1px;">TYPE:</span>
                        <button class="filter-chip active" id="type-all" onclick="setMediaType('all')">ALL</button>
                        <button class="filter-chip" id="type-video" onclick="setMediaType('video')">VIDEOS</button>
                        <button class="filter-chip" id="type-image" onclick="setMediaType('image')">IMAGES</button>
                    </div>
                </div>
            </div>

            <div id="gridContainer" class="grid"></div>

            <div id="watchContainer" class="watch-container">
                <div class="media-player-wrapper" id="wMedia"></div>

                <div class="post-details">
                    <div class="post-title" id="wTitle">Sighting Title</div>
                    <div class="post-meta">
                        Source: <span id="wSource" style="color:var(--accent-color);">Reddit</span> •
                        Author: <span id="wAuthor">User</span> •
                        <span id="wDate">Date</span>
                    </div>
                    <div class="post-body" id="wDesc">No description provided.</div>
                    <div class="action-row">
                        <button class="btn" id="wSaveBtn">💾 Save to local</button>
                        <a href="#" target="_blank" class="btn" id="wLinkBtn">🔗 View Original</a>
                    </div>
                    <div class="crypto-box">
                        <strong style="color:var(--text-secondary)">IMMUTABLE HASH:</strong><br>
                        <span id="wHash" style="color:var(--accent-color)">hash</span><br><br>
                        <strong style="color:var(--text-secondary)">PREV HASH:</strong><br>
                        <span id="wPrevHash">prev</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let fullLedger = [];
        let currentCategory = 'All';
        let currentSort = 'recent';
        let currentMediaType = 'all';
        let savedSightings = JSON.parse(localStorage.getItem('axiom_uap_saved')) || [];

        function decodeEntities(encodedString) {
            const textArea = document.createElement('textarea');
            textArea.innerHTML = encodedString;
            return textArea.value;
        }

        function setSort(type) {
            console.log("Sorting by:", type);
            currentSort = type;
            document.getElementById('sort-recent').classList.toggle('active', type === 'recent');
            document.getElementById('sort-popular').classList.toggle('active', type === 'popular');
            applyFilters();
        }

        function setMediaType(type) {
            console.log("Filtering by Type:", type);
            currentMediaType = type;
            document.getElementById('type-all').classList.toggle('active', type === 'all');
            document.getElementById('type-video').classList.toggle('active', type === 'video');
            document.getElementById('type-image').classList.toggle('active', type === 'image');
            applyFilters();
        }

        function setCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.sidebar-item').forEach(el => {
                el.classList.remove('active');
                if (el.innerText.includes(category) || (category === 'All' && el.innerText.includes('Global'))) {
                    el.classList.add('active');
                }
            });
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = [...fullLedger];

            if (currentCategory === 'Saved') {
                filtered = filtered.filter(b => savedSightings.includes(b.hash));
            } else if (currentCategory !== 'All') {
                filtered = filtered.filter(b => b.source.includes(currentCategory));
            }

            if (currentMediaType !== 'all') {
                filtered = filtered.filter(b => b.media_type === currentMediaType);
            }

            if (query) {
                filtered = filtered.filter(b =>
                    b.title.toLowerCase().includes(query) ||
                    (b.description && b.description.toLowerCase().includes(query))
                );
            }

            if (currentSort === 'popular') {
                filtered.sort((a, b) => (b.score || 0) - (a.score || 0));
            } else {
                filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            }

            closeWatchView();
            renderGrid(filtered);
        }

        function renderGrid(data) {
            const grid = document.getElementById('gridContainer');
            grid.innerHTML = '';
            data.forEach(block => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openWatchView(block.hash);

                // Use the archived thumbnail if it exists, otherwise fallback to original
                const thumbUrl = decodeEntities(block.thumbnail_url || block.media_url);
                const bgStyle = `background-image: url('${thumbUrl}')`;
                const typeLabel = block.media_type === 'video' ? '🎥 VIDEO' : '📸 IMAGE';

                card.innerHTML = `
                    <div class="thumbnail" style="${bgStyle}">
                        ${block.media_type === 'video' ? '<div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:40px; opacity:0.6;">▶</div>' : ''}
                        <button class="menu-btn" onclick="toggleSave(event, '${block.hash}')">⋮</button>
                        <div class="media-badge">${typeLabel}</div>
                    </div>
                    <div class="card-title">${decodeEntities(block.title)}</div>
                    <div class="card-meta">
                        <span>${block.source.split(' ')[0]}</span>
                        <span>${new Date(block.timestamp).toLocaleDateString()}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openWatchView(hash) {
            const block = fullLedger.find(b => b.hash === hash);
            if (!block) return;

            document.getElementById('gridContainer').style.display = 'none';
            document.getElementById('watchContainer').style.display = 'flex';
            const mediaContainer = document.getElementById('wMedia');

            const safeMediaUrl = decodeEntities(block.media_url);
            const safeThumbUrl = block.thumbnail_url ? decodeEntities(block.thumbnail_url) : '';

            if (block.media_type === 'video') {
                // Since engine.py NOW MERGES audio into the mp4, 
                // we simply play the video file directly.
                mediaContainer.innerHTML = `
                    <video id="mainVideo"
                           src="${safeMediaUrl}"
                           poster="${safeThumbUrl}"
                           controls 
                           playsinline
                           preload="auto"
                           style="width:100%; max-height:65vh; background:#000;"></video>`;

                // Optional: Error handling
                const video = document.getElementById('mainVideo');
                video.onerror = function () {
                    console.error("Video failed to load. It may be blocked by Reddit's CDN (403 Forbidden) or missing locally.");
                };
            } else {
                mediaContainer.innerHTML = `<img src="${safeMediaUrl}" style="max-width:100%; max-height:65vh; object-fit:contain;">`;
            }

            document.getElementById('wTitle').innerText = decodeEntities(block.title);
            document.getElementById('wSource').innerText = block.source;
            document.getElementById('wAuthor').innerText = block.author;
            document.getElementById('wDate').innerText = new Date(block.timestamp).toLocaleString();
            document.getElementById('wDesc').innerText = decodeEntities(block.description) || '';
            document.getElementById('wLinkBtn').href = block.source_url;
            document.getElementById('wHash').innerText = block.hash;
            document.getElementById('wPrevHash').innerText = block.prev_hash;

            const saveBtn = document.getElementById('wSaveBtn');
            saveBtn.innerText = savedSightings.includes(block.hash) ? '✅ Saved' : '💾 Save to local';
            saveBtn.onclick = (e) => toggleSave(e, block.hash);
        }

        function toggleSave(event, hash) {
            event.stopPropagation();
            if (savedSightings.includes(hash)) {
                savedSightings = savedSightings.filter(h => h !== hash);
            } else {
                savedSightings.push(hash);
            }
            localStorage.setItem('axiom_uap_saved', JSON.stringify(savedSightings));
            applyFilters();
        }

        function closeWatchView() {
            document.getElementById('watchContainer').style.display = 'none';
            document.getElementById('wMedia').innerHTML = '';
            document.getElementById('gridContainer').style.display = 'grid';
        }

        async function init() {
            try {
                const response = await fetch('ledger.json?nocache=' + new Date().getTime());
                if (response.ok) {
                    fullLedger = await response.json();
                    applyFilters();
                }
            } catch (err) { console.error(err); }
        }
        init();
    </script>
</body>

</html>
