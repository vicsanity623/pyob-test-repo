<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>AXIOM · UAP Archive</title>
  <meta name="theme-color" content="#040608" />
  <meta name="referrer" content="no-referrer" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ── TOKENS ────────────────────────────────────────────────────────────── */
    :root {
      --bg:       #040608;
      --card-bg:  #0b0f14;
      --surface:  #111820;
      --border:   #1a2230;
      --accent:   #00e89a;
      --accent2:  #1a6eff;
      --text:     #dde3ed;
      --sub:      #5a6070;
      --gap:      2px;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'Space Grotesk', sans-serif;
      --header-h: 52px;
      --filter-h: 42px;
    }

    /* ── RESET ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow-x: hidden;
      min-height: 100vh;
    }

    ::selection { background: var(--accent); color: #000; }

    /* ── iOS SAFE AREA ─────────────────────────────────────────────────────── */
    .safe-top {
      height: env(safe-area-inset-top);
      background: #000;
      position: sticky;
      top: 0;
      z-index: 300;
    }

    /* ── HEADER ────────────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: env(safe-area-inset-top);
      z-index: 200;
      height: var(--header-h);
      background: rgba(4, 6, 8, 0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    .logo-pip {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 var(--accent);
      animation: pip-pulse 2.4s ease-in-out infinite;
    }

    @keyframes pip-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,232,154,.7); }
      50%       { box-shadow: 0 0 0 5px rgba(0,232,154,0); }
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--sub);
      text-transform: uppercase;
      margin-top: -1px;
    }

    /* search */
    .search-wrap {
      flex: 1;
      max-width: 380px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.5px;
      padding: 8px 32px 8px 12px;
      outline: none;
      transition: border-color .2s;
    }

    .search-wrap input::placeholder { color: var(--sub); }
    .search-wrap input:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--sub);
      font-size: 13px;
      pointer-events: none;
    }

    /* header counter */
    .sig-count {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--sub);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sig-count strong {
      color: var(--accent);
      font-weight: 700;
    }

    /* ── FILTER BAR ────────────────────────────────────────────────────────── */
    .filter-bar {
      position: sticky;
      top: calc(env(safe-area-inset-top) + var(--header-h));
      z-index: 190;
      height: var(--filter-h);
      background: rgba(4, 6, 8, 0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .chip {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--sub);
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      user-select: none;
      flex-shrink: 0;
    }

    .chip:hover        { border-color: var(--accent); color: var(--accent); }
    .chip.active       { background: var(--accent); border-color: var(--accent); color: #000; }
    .chip.active-blue  { background: var(--accent2); border-color: var(--accent2); color: #fff; }

    .divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── GRID ──────────────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap);
      padding: var(--gap);
    }

    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width:  700px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width:  380px) { .grid { grid-template-columns: 1fr; } }

    /* ── CARD ──────────────────────────────────────────────────────────────── */
    .card {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      cursor: pointer;
      background: var(--card-bg);
    }

    /* Phosphor glow on hover — the signature element */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 1.5px transparent;
      transition: box-shadow .25s;
      z-index: 20;
      pointer-events: none;
    }
    .card:hover::after {
      box-shadow: inset 0 0 0 1.5px var(--accent),
                  0 0 18px rgba(0,232,154,.18);
    }

    /* thumbnail */
    .card-thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity .35s;
    }

    /* video */
    .card-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .35s;
    }

    /* Only fade thumb out when video is actually playing */
    .card.live .card-thumb { opacity: 0; }
    .card.live .card-video { opacity: 1; }

    /* ── play ring ── */
    .play-ring {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
    }

    .play-ring-inner {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .play-ring svg { margin-left: 3px; }

    .card:hover:not(.live) .play-ring { opacity: 1; }

    /* ── bottom overlay ── */
    .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 28px 10px 9px;
      background: linear-gradient(transparent, rgba(0,0,0,.92) 55%);
      transform: translateY(101%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      z-index: 10;
      pointer-events: none;
    }

    .card:hover .card-overlay { transform: translateY(0); }

    .card-title {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.35;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 5px;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-src {
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--accent);
      opacity: .7;
      text-transform: uppercase;
    }

    .card-age {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--sub);
    }

    /* ── top badges ── */
    .score-badge {
      position: absolute;
      top: 7px;
      right: 7px;
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 3px 7px;
      border-radius: 3px;
      background: rgba(0,0,0,.75);
      color: var(--accent);
      border: 1px solid rgba(0,232,154,.2);
      z-index: 12;
      opacity: 0;
      transition: opacity .2s;
    }

    .card:hover .score-badge { opacity: 1; }

    /* live indicator (pulsing dot for in-viewport playing cards) */
    .live-dot {
      position: absolute;
      top: 7px;
      left: 7px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      z-index: 12;
      opacity: 0;
      box-shadow: 0 0 6px var(--accent);
    }

    .card.live .live-dot { opacity: 1; animation: pip-pulse 1.5s ease-in-out infinite; }

    /* ── broken thumbnail fallback ── */
    .card-no-thumb {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--sub);
      flex-direction: column;
      gap: 8px;
    }

    .card-no-thumb-icon { font-size: 22px; opacity: .4; }

    /* ── SENTINEL / LOADER ─────────────────────────────────────────────────── */
    #sentinel {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,232,154,.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── EMPTY STATE ───────────────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      padding: 80px 20px;
      text-align: center;
    }

    .empty-state .glyph {
      font-size: 52px;
      margin-bottom: 20px;
      opacity: .3;
    }

    .empty-state p {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--sub);
      text-transform: uppercase;
      line-height: 1.9;
    }

    .empty-state code {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      background: rgba(0,232,154,.07);
      padding: 2px 8px;
      border-radius: 3px;
    }

    /* ── MODAL ─────────────────────────────────────────────────────────────── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(2, 4, 6, 0.96);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    #modal.open {
      display: block;
      animation: modal-in .22s ease;
    }

    @keyframes modal-in {
      from { opacity: 0; transform: scale(1.01); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-close {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 14px);
      right: 16px;
      z-index: 510;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(10,15,20,.9);
      border: 1px solid var(--border);
      color: var(--sub);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .modal-close:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    .modal-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px calc(env(safe-area-inset-bottom) + 40px);
    }

    .modal-player {
      width: 100%;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 14px;
      position: relative;
    }

    .modal-player video,
    .modal-player img {
      width: 100%;
      max-height: 72vh;
      object-fit: contain;
      display: block;
    }

    .modal-unavailable {
      padding: 48px 24px;
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--sub);
      line-height: 2;
    }

    .modal-unavailable a { color: var(--accent); text-decoration: none; }
    .modal-unavailable a:hover { text-decoration: underline; }

    /* modal info panel */
    .modal-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px;
    }

    .modal-title {
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .modal-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .pill {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--sub);
    }

    .pill.green  { color: var(--accent);  border-color: rgba(0,232,154,.3);  background: rgba(0,232,154,.06);  }
    .pill.blue   { color: var(--accent2); border-color: rgba(26,110,255,.3); background: rgba(26,110,255,.06); }

    .modal-desc {
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.7;
      color: #8a93a6;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 130px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 9px 16px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--sub);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
    }

    .btn:hover            { border-color: var(--accent); color: var(--accent); }
    .btn.saved            { border-color: var(--accent); color: var(--accent); background: rgba(0,232,154,.07); }

    /* hash block */
    .hash-block {
      margin-top: 16px;
      padding: 12px 14px;
      background: rgba(0,0,0,.5);
      border-left: 2px solid rgba(0,232,154,.3);
      border-radius: 0 4px 4px 0;
    }

    .hash-label {
      font-family: var(--mono);
      font-size: 7px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--sub);
      display: block;
      margin-bottom: 4px;
    }

    .hash-value {
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(0,232,154,.45);
      word-break: break-all;
      line-height: 1.6;
    }

    /* ── SCROLLBAR ─────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--sub); }
  </style>
</head>

<body>
  <div class="safe-top"></div>

  <header>
    <div class="logo" id="logoReset">
      <div class="logo-pip"></div>
      <div>
        <div class="logo-text">AXIOM</div>
        <div class="logo-sub">UAP Archive</div>
      </div>
    </div>

    <div class="search-wrap">
      <input type="search" id="searchInput"
             placeholder="SEARCH SIGNALS…"
             spellcheck="false"
             autocomplete="off" />
      <span class="search-icon">⌕</span>
    </div>

    <div class="sig-count">
      <strong id="countDisplay">0</strong>&nbsp;SIGNALS
    </div>
  </header>

  <div class="filter-bar">
    <button class="chip active"      data-g="src"  data-v="all">ALL</button>
    <button class="chip"             data-g="src"  data-v="Reddit">REDDIT</button>
    <button class="chip"             data-g="src"  data-v="4chan">4CHAN /X/</button>
    <div class="divider"></div>
    <button class="chip active"      data-g="sort" data-v="recent">RECENT</button>
    <button class="chip"             data-g="sort" data-v="popular">TOP RATED</button>
    <div class="divider"></div>
    <button class="chip"             data-g="fav"  data-v="saved" id="savedChip">SAVED</button>
  </div>

  <div class="grid" id="grid"></div>
  <div id="sentinel"><div class="spinner" id="spinner"></div></div>

  <!-- ── MODAL ── -->
  <div id="modal">
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <div class="modal-body">
      <div class="modal-player" id="modalPlayer"></div>
      <div class="modal-panel">
        <div class="modal-title"    id="modalTitle"></div>
        <div class="modal-pills"    id="modalPills"></div>
        <div class="modal-desc"     id="modalDesc"></div>
        <div class="modal-actions"  id="modalActions"></div>
        <div class="hash-block">
          <span class="hash-label">SHA-256 · IMMUTABLE HASH</span>
          <div  class="hash-value" id="modalHash"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── STATE ──────────────────────────────────────────────────────────────── */
    let fullLedger = [];
    let filtered   = [];
    let rendered   = 0;
    const PAGE     = 24;

    const saved = new Set(JSON.parse(localStorage.getItem('axiom_v2_saved') || '[]'));

    const S = { src: 'all', sort: 'recent', fav: false, q: '' };

    /* ── UTILS ──────────────────────────────────────────────────────────────── */
    const dec = s => {
      if (!s) return '';
      const t = document.createElement('textarea');
      t.innerHTML = s;
      return t.value;
    };

    const srcShort = src => {
      if (!src) return '?';
      if (src.includes('/r/')) return src.replace(/Reddit \/r\//, '/r/').split(' ')[0];
      if (src.includes('4chan')) return '4ch/x/';
      if (src.includes('Search')) return 'r/search';
      return src.split(' ')[0];
    };

    const timeAgo = ts => {
      const s = (Date.now() - new Date(ts)) / 1000;
      if (s < 60)    return `${Math.floor(s)}s ago`;
      if (s < 3600)  return `${Math.floor(s/60)}m ago`;
      if (s < 86400) return `${Math.floor(s/3600)}h ago`;
      return `${Math.floor(s/86400)}d ago`;
    };

    /* ── FILTERS ────────────────────────────────────────────────────────────── */
    function applyFilters() {
      const q = S.q.toLowerCase();
      filtered = fullLedger.filter(b => {
        if (S.fav && !saved.has(b.hash)) return false;
        if (S.src !== 'all' && !b.source.includes(S.src)) return false;
        if (q && !b.title.toLowerCase().includes(q) &&
                 !(b.description||'').toLowerCase().includes(q)) return false;
        return true;
      });

      filtered.sort((a, b) =>
        S.sort === 'popular'
          ? (b.score||0) - (a.score||0)
          : new Date(b.timestamp) - new Date(a.timestamp)
      );

      rendered = 0;
      document.getElementById('grid').innerHTML = '';
      document.getElementById('countDisplay').textContent = filtered.length.toLocaleString();
      renderNext();
    }

    /* ── RENDER ─────────────────────────────────────────────────────────────── */
    function renderNext() {
      const batch = filtered.slice(rendered, rendered + PAGE);
      const grid  = document.getElementById('grid');

      if (rendered === 0 && batch.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="glyph">🛸</div>
            <p>NO SIGNALS FOUND<br>
               ${fullLedger.length === 0
                 ? `RUN <code>python engine.py</code> TO BUILD THE ARCHIVE`
                 : `TRY A DIFFERENT FILTER`}
            </p>
          </div>`;
      }

      batch.forEach(b => grid.appendChild(makeCard(b)));
      rendered += batch.length;

      const spinner = document.getElementById('spinner');
      spinner.style.display = rendered >= filtered.length ? 'none' : 'block';
    }

    /* ── CARD ───────────────────────────────────────────────────────────────── */
    function makeCard(b) {
      const card  = document.createElement('div');
      card.className = 'card';
      card.dataset.hash = b.hash;

      const thumb = dec(b.thumbnail_url || b.media_url);
      const src   = dec(b.media_url);
      const label = srcShort(b.source);
      const score = b.score > 0 ? `▲ ${b.score}` : '';

      card.innerHTML = `
        <img  class="card-thumb"
              src="${thumb}"
              loading="lazy"
              decoding="async"
              onerror="this.replaceWith(Object.assign(document.createElement('div'), {className:'card-no-thumb', innerHTML:'<div class=card-no-thumb-icon>📡</div>NO PREVIEW'}))" />
        <video class="card-video"
               muted loop playsinline preload="none"
               data-src="${src}"></video>
        <div class="live-dot"></div>
        <div class="play-ring">
          <div class="play-ring-inner">
            <svg width="11" height="13" viewBox="0 0 11 13" fill="rgba(255,255,255,.85)">
              <polygon points="0,0 11,6.5 0,13"/>
            </svg>
          </div>
        </div>
        ${score ? `<div class="score-badge">${score}</div>` : ''}
        <div class="card-overlay">
          <div class="card-title">${dec(b.title)}</div>
          <div class="card-bottom">
            <span class="card-src">${label}</span>
            <span class="card-age">${timeAgo(b.timestamp)}</span>
          </div>
        </div>
      `;

      const video = card.querySelector('.card-video');

      // Hover play
      card.addEventListener('mouseenter', () => {
        if (!video.src) video.src = video.dataset.src;
        video.play().then(() => card.classList.add('live')).catch(() => {});
      });
      card.addEventListener('mouseleave', () => {
        // Only stop if NOT controlled by IntersectionObserver (not in-viewport-play)
        if (!card._autoplay) {
          video.pause();
          card.classList.remove('live');
        }
      });

      card.addEventListener('click', () => openModal(b.hash));
      return card;
    }

    /* ── INTERSECTION OBSERVER — Living Wall ────────────────────────────────── */
    // Track playing cards so we can cap simultaneous playback
    const playing = new Set();
    const MAX_SIM = 10;

    const wallObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        const card  = entry.target;
        const video = card.querySelector('.card-video');
        if (!video) return;

        if (entry.isIntersecting) {
          if (!video.src) video.src = video.dataset.src;

          // Evict oldest if at cap
          if (playing.size >= MAX_SIM) {
            const oldest = playing.values().next().value;
            const ov = oldest.querySelector('.card-video');
            if (ov) ov.pause();
            oldest._autoplay = false;
            oldest.classList.remove('live');
            playing.delete(oldest);
          }

          video.play().then(() => {
            card._autoplay = true;
            card.classList.add('live');
            playing.add(card);
          }).catch(() => {});
        } else {
          if (card._autoplay) {
            video.pause();
            card._autoplay = false;
            card.classList.remove('live');
            playing.delete(card);
          }
        }
      });
    }, { rootMargin: '0px', threshold: 0.4 });

    // Patch renderNext to observe new cards
    const origRenderNext = renderNext;
    function renderNext() {
      const before = document.getElementById('grid').children.length;
      origRenderNext.call(this);
      const cards = document.getElementById('grid').children;
      for (let i = before; i < cards.length; i++) {
        wallObserver.observe(cards[i]);
      }
    }

    /* ── INFINITE SCROLL ────────────────────────────────────────────────────── */
    new IntersectionObserver(entries => {
      if (entries[0].isIntersecting && rendered < filtered.length) renderNext();
    }, { rootMargin: '300px' }).observe(document.getElementById('sentinel'));

    /* ── MODAL ──────────────────────────────────────────────────────────────── */
    function openModal(hash) {
      const b = fullLedger.find(x => x.hash === hash);
      if (!b) return;

      const src   = dec(b.media_url);
      const thumb = dec(b.thumbnail_url || '');
      const label = srcShort(b.source);

      document.getElementById('modalPlayer').innerHTML = `
        <video src="${src}"
               poster="${thumb}"
               controls autoplay playsinline
               style="width:100%;max-height:72vh;background:#000;"
               onerror="this.closest('.modal-player').innerHTML=\`
                 <div class='modal-unavailable'>
                   ⚠ SIGNAL UNAVAILABLE — CDN LINK EXPIRED<br>
                   <a href='${dec(b.source_url)}' target='_blank' rel='noopener'>
                     VIEW ORIGINAL SOURCE ↗
                   </a>
                 </div>\`">
        </video>`;

      document.getElementById('modalTitle').textContent = dec(b.title);

      const isSaved = saved.has(b.hash);
      document.getElementById('modalPills').innerHTML = `
        <span class="pill green">${b.source}</span>
        <span class="pill">by ${b.author || 'Anonymous'}</span>
        <span class="pill">${new Date(b.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
        ${b.score > 0 ? `<span class="pill blue">▲ ${b.score} upvotes</span>` : ''}
        ${b.platform ? `<span class="pill">${b.platform}</span>` : ''}
      `;

      document.getElementById('modalDesc').textContent =
        dec(b.description) || 'No description provided.';

      document.getElementById('modalActions').innerHTML = `
        <button class="btn ${isSaved ? 'saved' : ''}"
                id="saveBtn"
                onclick="toggleSave('${b.hash}')">
          ${isSaved ? '✓ SAVED' : '⊕ SAVE'}
        </button>
        <a href="${dec(b.source_url)}" target="_blank" rel="noopener" class="btn">
          ↗ ORIGINAL
        </a>
        <a href="${src}" download class="btn">↓ DOWNLOAD</a>
      `;

      document.getElementById('modalHash').textContent = b.hash || '—';

      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      const v = modal.querySelector('video');
      if (v) v.pause();
      document.getElementById('modalPlayer').innerHTML = '';
      modal.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    /* ── SAVE / BOOKMARK ────────────────────────────────────────────────────── */
    function toggleSave(hash) {
      saved.has(hash) ? saved.delete(hash) : saved.add(hash);
      localStorage.setItem('axiom_v2_saved', JSON.stringify([...saved]));
      const btn = document.getElementById('saveBtn');
      if (btn) {
        btn.textContent = saved.has(hash) ? '✓ SAVED' : '⊕ SAVE';
        btn.classList.toggle('saved', saved.has(hash));
      }
      if (S.fav) applyFilters();
    }

    /* ── CHIPS ──────────────────────────────────────────────────────────────── */
    document.querySelectorAll('.chip[data-g]').forEach(chip => {
      chip.addEventListener('click', () => {
        const g = chip.dataset.g;
        const v = chip.dataset.v;

        if (g === 'fav') {
          // Toggle behaviour
          S.fav = !S.fav;
          chip.classList.toggle('active', S.fav);
          applyFilters();
          return;
        }

        document.querySelectorAll(`.chip[data-g="${g}"]`).forEach(c => c.classList.remove('active'));
        chip.classList.add('active');

        if (g === 'src')  S.src  = v;
        if (g === 'sort') S.sort = v;
        applyFilters();
      });
    });

    /* ── SEARCH ─────────────────────────────────────────────────────────────── */
    let searchTick;
    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(searchTick);
      searchTick = setTimeout(() => { S.q = e.target.value.trim(); applyFilters(); }, 280);
    });

    /* ── LOGO RESET ─────────────────────────────────────────────────────────── */
    document.getElementById('logoReset').addEventListener('click', () => {
      S.src = 'all'; S.sort = 'recent'; S.fav = false; S.q = '';
      document.getElementById('searchInput').value = '';
      document.querySelectorAll('.chip[data-g]').forEach(c => c.classList.remove('active'));
      document.querySelector('.chip[data-g="src"][data-v="all"]').classList.add('active');
      document.querySelector('.chip[data-g="sort"][data-v="recent"]').classList.add('active');
      applyFilters();
    });

    /* ── INIT ───────────────────────────────────────────────────────────────── */
    (async () => {
      try {
        const res = await fetch(`ledger.json?t=${Date.now()}`);
        if (res.ok) {
          fullLedger = await res.json();
          applyFilters();
        } else {
          applyFilters(); // will show empty state
        }
      } catch (err) {
        console.error('Ledger load failed:', err);
        applyFilters();
      }
    })();

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          })
          .catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</body>
</html>
