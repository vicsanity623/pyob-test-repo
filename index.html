<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poke UI</title>
    <!-- PWA Requirements -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/icon.png"> <!-- Add an icon to your assets folder -->
    
    <!-- Tailwind CSS for modern 2026 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white h-screen w-screen overflow-hidden font-sans select-none touch-manipulation">
    
    <!-- 1. LOADING SCREEN -->
    <div id="loading-screen" class="screen active flex flex-col items-center justify-center h-full bg-gradient-to-b from-blue-900 to-gray-900 z-50 absolute w-full">
        <h1 class="text-4xl font-black mb-4 animate-pulse">Initializing System...</h1>
        <div class="w-64 h-2 bg-gray-700 rounded-full overflow-hidden">
            <div id="loading-bar" class="h-full bg-blue-400 w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 2. MAIN MENU -->
    <div id="main-menu" class="screen flex flex-col items-center justify-center h-full bg-[url('assets/bg.jpg')] bg-cover w-full absolute hidden">
        <div class="glass-panel p-8 rounded-3xl text-center flex flex-col gap-4 w-10/12 max-w-sm shadow-2xl backdrop-blur-md">
            <h1 class="text-5xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-red-500 title-glow">POKÉ CARE</h1>
            <button onclick="startGame(true)" class="btn-primary py-4 rounded-xl text-xl font-bold bg-blue-600 hover:bg-blue-500">Start New Game</button>
            <button onclick="startGame(false)" id="btn-continue" class="btn-secondary py-4 rounded-xl text-xl font-bold bg-gray-700 hover:bg-gray-600 hidden">Continue</button>
        </div>
    </div>

    <!-- 3. INTRO STORY SCREEN -->
    <div id="intro-screen" class="screen flex flex-col items-center justify-between h-full bg-gray-800 w-full absolute hidden p-6">
        <div class="mt-20">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-48 mx-auto filter drop-shadow-xl animate-bounce">
        </div>
        <div class="glass-panel p-6 rounded-2xl w-full mb-10">
            <p id="story-text" class="text-lg mb-4 h-24">Welcome to the world of Pokemon! Your dream to become a Master begins now.</p>
            <button onclick="nextStory()" class="w-full py-3 bg-white text-black rounded-lg font-bold">Next</button>
        </div>
    </div>

    <!-- 4. MAIN HUB (CARE SYSTEM) -->
    <div id="hub-screen" class="screen flex flex-col h-full bg-gradient-to-b from-green-900 to-gray-900 w-full absolute hidden relative">
        <div id="time-overlay" class="absolute inset-0 pointer-events-none z-20 transition-colors duration-1000"></div>
        <!-- Stats Top Bar -->
        <div class="flex justify-between items-center p-6 glass-panel m-4 rounded-2xl">
            <div>
                <h2 id="hub-name" class="text-2xl font-black uppercase">Bulbasaur</h2>
                <p class="text-sm text-gray-300">Level <span id="hub-level">5</span></p>
            </div>
            <div class="flex gap-1 flex-wrap justify-end max-w-[50%]" id="heart-container">
                <!-- Hearts injected here -->
            </div>
        </div>

        <!-- Pokemon Sprite Area -->
        <div id="sprite-container" class="flex-1 flex items-center justify-center relative touch-area">
            <div id="petting-zone" class="absolute inset-0 z-10 cursor-pointer"></div>
            <div id="swirl-effect" class="absolute w-48 h-48 rounded-full border-4 border-pink-500 hidden opacity-0"></div>
            <img id="hub-sprite" src="" class="w-64 h-64 object-contain filter drop-shadow-2xl transition-transform duration-300 transform scale-100 pixel-perfect">
        </div>

        <!-- XP Bar & Controls -->
        <div class="glass-panel p-6 rounded-t-3xl mt-auto">
            <div class="mb-4">
                <p class="text-xs font-bold text-right mb-1">XP</p>
                <div class="w-full h-4 bg-gray-800 rounded-full overflow-hidden border border-gray-700">
                    <div id="xp-bar" class="h-full shiny-gradient w-0 transition-all duration-500"></div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="feedBerry()" class="py-4 bg-pink-600 rounded-xl font-bold flex flex-col items-center shadow-lg active:scale-95 transition-transform">
                    <span class="text-2xl">🍓</span> Feed Berry (<span id="berry-count">5</span>)
                </button>
                <button onclick="enterBattle()" class="py-4 bg-red-600 rounded-xl font-bold flex flex-col items-center shadow-lg active:scale-95 transition-transform">
                    <span class="text-2xl">⚔️</span> Battle
                </button>
            </div>
        </div>
    </div>

    <!-- 5. BATTLE SCREEN -->
    <div id="battle-screen" class="screen flex flex-col h-full bg-gray-900 w-full absolute hidden">
        <!-- Enemy Area -->
        <div class="flex-1 flex flex-col justify-center items-end p-8 relative">
            <div class="glass-panel p-3 rounded-xl absolute top-10 left-6 w-48">
                <h3 id="enemy-name" class="font-bold">Wild Pidgey</h3>
                <div class="w-full h-2 bg-gray-700 rounded-full mt-2"><div id="enemy-hp" class="h-full bg-green-500 w-full transition-all"></div></div>
            </div>
            <img id="enemy-sprite" src="" class="w-40 h-40 object-contain translate-x-10 pixel-perfect">
        </div>
        
        <!-- Player Area -->
        <div class="flex-1 flex flex-col justify-center items-start p-8 relative">
            <div class="glass-panel p-3 rounded-xl absolute top-0 right-6 w-48">
                <h3 id="battle-player-name" class="font-bold">Bulbasaur</h3>
                <div class="w-full h-2 bg-gray-700 rounded-full mt-2"><div id="player-hp" class="h-full bg-green-500 w-full transition-all"></div></div>
            </div>
            <img id="battle-player-sprite" src="" class="w-48 h-48 object-contain -translate-x-10 pixel-perfect">
        </div>

        <!-- Moves UI -->
        <div class="glass-panel p-6 rounded-t-3xl h-1/3 grid grid-cols-2 gap-4">
            <button onclick="playerAttack()" class="bg-blue-600 rounded-xl font-bold text-xl active:bg-blue-400">Tackle</button>
            <button onclick="playerAttack()" class="bg-indigo-600 rounded-xl font-bold text-xl active:bg-indigo-400">Growl</button>
        </div>
    </div>

    <!-- 6. EVOLUTION SCREEN -->
    <div id="evo-screen" class="screen flex items-center justify-center h-full bg-white w-full absolute hidden z-50">
        <div class="text-center">
            <h1 class="text-black text-3xl font-black mb-10">What? <span id="evo-old-name">Bulbasaur</span> is evolving!</h1>
            <img id="evo-sprite" src="" class="w-64 h-64 object-contain mx-auto mix-blend-multiply animate-pulse filter contrast-200 brightness-0">
        </div>
    </div>

    <!-- CUSTOM ALERT MODAL -->
    <div id="custom-modal" class="fixed inset-0 bg-black bg-opacity-70 z-[100] flex items-center justify-center hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm">
        <div class="bg-gray-800 border border-gray-600 p-6 rounded-2xl w-10/12 max-w-sm text-center shadow-2xl transform scale-95 transition-transform duration-300" id="modal-content">
            <h3 id="modal-title" class="text-2xl font-black text-white mb-2">Notification</h3>
            <p id="modal-desc" class="text-gray-300 mb-6 text-lg">Message goes here</p>
            <button onclick="closeModal()" class="w-full py-3 bg-blue-600 rounded-xl font-bold text-white shadow-lg active:scale-95 transition-transform">Awesome!</button>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        function updateEnvironment() {
            const hour = new Date().getHours();
            const overlay = document.getElementById('time-overlay');
            if (!overlay) return;
            if (hour >= 6 && hour < 18) {
                overlay.className = 'absolute inset-0 pointer-events-none z-20 transition-colors duration-1000 time-day';
            } else if (hour >= 18 && hour < 20) {
                overlay.className = 'absolute inset-0 pointer-events-none z-20 transition-colors duration-1000 time-evening';
            } else {
                overlay.className = 'absolute inset-0 pointer-events-none z-20 transition-colors duration-1000 time-night';
            }
        }
        updateEnvironment();
        setInterval(updateEnvironment, 60000);

        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js').catch(() => console.warn('Service Worker registration failed.'));
      }
  </script>
</body>
</html>
