<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VicsBoard 0.0.1.b</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#080c18">
    <link rel="stylesheet" href="style.css">
</head>

<body class="app-shell">

    <!-- ─── App Header ──────────────────────────────────────────────── -->
    <header id="app-header" class="app-header">
        <div class="header-brand">
            <div class="brand-icon-wrap">⚡</div>
            <div>
                <h1 class="brand-title">v<em>0.0.1.b</em></h1>
                <p class="brand-sub">Simulation Playground</p>
            </div>
        </div>
        <div class="header-controls">
            <button id="btn-wires" class="btn btn-wire" title="Manage Wires">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                </svg>
                <span>Wires</span>
            </button>
            <button id="btn-play-pause" class="btn btn-play">
                <span id="play-icon">⏸</span><span id="play-text">Pause</span>
            </button>
            <button id="btn-clear" class="btn btn-ghost">Clear</button>
        </div>
    </header>

    <!-- ─── Mobile Tab Bar ─────────────────────────────────────────── -->
    <nav id="mobile-nav" class="mobile-tab-bar">
        <button class="mobile-tab active" id="mtab-workspace" onclick="switchMobileTab('workspace')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="2" />
                <path d="M8 12h8M12 8v8" />
            </svg>
            Workspace
        </button>
        <button class="mobile-tab" id="mtab-parts" onclick="switchMobileTab('parts')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                    d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
            </svg>
            Parts
        </button>
        <button class="mobile-tab" id="mtab-guide" onclick="switchMobileTab('guide')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            </svg>
            Guide
        </button>
    </nav>

    <!-- ─── Main 3-Column Layout ───────────────────────────────────── -->
    <div id="main-layout" class="main-content">

        <!-- Parts Sidebar -->
        <aside id="panel-parts" class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Component Library</span>
                <input type="text" id="part-search" placeholder="Search parts…" oninput="filterParts(this.value)"
                    class="part-search" autocomplete="off">
            </div>
            <div id="parts-container" class="sidebar-body"></div>
        </aside>

        <!-- Workspace Canvas -->
        <main id="workspace" class="workspace">
            <!-- Wire SVG layer (pointer-events handled per-path) -->
            <svg id="wire-layer" class="wire-svg"></svg>

            <!-- Component DOM layer -->
            <div id="components-container" class="comp-container"></div>


            <!-- Long-press progress ring (mobile) -->
            <div id="lp-ring" class="lp-ring hidden">
                <svg viewBox="0 0 36 36" width="48" height="48">
                    <circle class="lp-track" cx="18" cy="18" r="15" fill="none" stroke-width="3" />
                    <circle id="lp-progress" class="lp-fill" cx="18" cy="18" r="15" fill="none" stroke-width="3"
                        stroke-dasharray="94.2" stroke-dashoffset="94.2" transform="rotate(-90 18 18)" />
                </svg>
            </div>
        </main>

        <!-- Guide Sidebar -->
        <aside id="panel-guide" class="sidebar sidebar-right">
            <div class="sidebar-header">
                <span class="sidebar-title">Tutorial Guide</span>
                <select id="tutorial-select" onchange="switchTutorial(this.value)" class="tut-select">
                    <option value="lead_acid">1. DIY 4.0V Epsom-Salt Battery</option>
                    <option value="solar_charge">2. Solar Charging Regulator</option>
                    <option value="class_a_amp">3. Class-A BJT Amplifier</option>
                    <option value="voltage_reg">4. LM7805 5V Regulator</option>
                    <option value="led_blink">5. NE555 LED Blinker</option>
                </select>
            </div>
            <div class="sidebar-body">
                <div id="step-tracker" class="step-list"></div>
                <div class="metrics-panel">
                    <div class="metrics-title">
                        <span class="metrics-dot"></span> Live Node Metrics
                    </div>
                    <div id="live-metrics" class="metrics-body">
                        <span class="muted-hint">No components connected.</span>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- ─── Wire Manager Modal ─────────────────────────────────────── -->
    <div id="wire-overlay" class="overlay hidden" onclick="closeWireManagerOutside(event)">
        <div class="modal" id="wire-modal">
            <div class="modal-head">
                <span class="modal-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                    Wire Manager
                </span>
                <button onclick="closeWireManager()" class="modal-close">✕</button>
            </div>
            <p class="modal-hint">
                <strong>Mobile tip:</strong> Hold a wire for 0.6s to delete it, or manage all connections here.
            </p>
            <div id="wire-list" class="wire-scroll"></div>
            <div class="modal-foot">
                <button onclick="deleteAllWires()" class="btn btn-danger-sm">🗑 Delete All Wires</button>
                <button onclick="closeWireManager()" class="btn btn-ghost">Done</button>
            </div>
        </div>
    </div>

    <!-- ─── Toast Notification ────────────────────────────────────── -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>

</html>
