<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NotGPT | Hip Hop Ledger</title>
    
    <!-- PWA Manifest & App Icons -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f0f">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

        :root {
            --bg-color: #0f0f0f;
            --surface-color: #212121;
            --hover-color: #3d3d3d;
            --text-primary: #f1f1f1;
            --text-secondary: #aaaaaa;
            --accent-color: #3ea6ff;
            --verified-color: #2ba640;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            /* FIX: Pushes header down below the iOS notch */
            padding-top: max(10px, env(safe-area-inset-top)); 
            height: auto;
            min-height: 60px;
            padding-bottom: 10px;
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(45deg, #ff4500, #ff8c00);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .search-bar {
            display: flex;
            flex: 0 1 600px;
            background-color: #121212;
            border: 1px solid #303030;
            border-radius: 40px;
            overflow: hidden;
            margin: 0 20px;
        }

        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 10px 20px;
            font-size: 16px;
            outline: none;
        }

        .search-bar button {
            background-color: #222222;
            border: none;
            border-left: 1px solid #303030;
            padding: 0 20px;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s;
        }

        .search-bar button:hover { background-color: #303030; }

        /* --- MAIN LAYOUT --- */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 240px;
            background-color: var(--bg-color);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
        }

        .sidebar-item {
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sidebar-item:hover, .sidebar-item.active {
            background-color: var(--surface-color);
        }

        /* --- CONTENT AREA --- */
        .content {
            flex: 1;
            overflow-y: auto;
            background-color: var(--bg-color);
            padding: 20px;
            /* FIX: Add bottom padding so last items aren't hidden by iOS home bar */
            padding-bottom: max(50px, env(safe-area-inset-bottom));
        }

        /* --- FILTERS --- */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .filter-chip {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }

        .filter-chip:hover { background-color: var(--hover-color); }
        .filter-chip.active { background-color: var(--text-primary); color: var(--bg-color); }

        /* --- VIDEO / FACT GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 12px;
            cursor: pointer;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            position: relative;
            background-color: #222;
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            transition: 0.2s;
            /* We use an inline style to apply the dark gradient overlay over the image */
        }

        .card:hover .thumbnail {
            border-radius: 0px; 
        }

        .thumbnail-text {
            font-size: 22px;
            font-weight: 700;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
            z-index: 2;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .source-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0,0,0,0.8);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            z-index: 2;
        }

        .card-info {
            display: flex;
            gap: 12px;
        }

        .channel-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--surface-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }

        .meta {
            display: flex;
            flex-direction: column;
        }

        .fact-title {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .fact-details {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .verified-icon {
            color: var(--verified-color);
            font-size: 12px;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
        }
        .action-btn:hover { color: var(--text-primary); }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .search-bar { margin: 0 10px; flex: 1; }
            .logo-text-hide { display: none; } /* hide text on mobile to save space */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-icon">AE</div>
            <span class="logo-text-hide">NotGPT</span>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search verified facts...">
            <button onclick="applyFilters()">🔍</button>
        </div>
        <div class="logo logo-text-hide" style="font-size:12px; color:var(--text-secondary)">
            Sync: <span id="syncStatus" style="color:var(--verified-color)">● Active</span>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-item active" onclick="setCategory('All')">🏠 Home</div>
            <div class="sidebar-item" onclick="setCategory('Eminem')">🎤 Eminem Facts</div>
            <div class="sidebar-item" onclick="setCategory('Trending')">🔥 Trending News</div>
            <div style="border-top: 1px solid var(--surface-color); margin: 10px 0;"></div>
            <div class="sidebar-item" onclick="setCategory('Favorites')">⭐ Favorites</div>
            <div class="sidebar-item" onclick="setCategory('History')">🕒 History</div>
        </aside>

        <main class="content">
            <div class="filters" id="filterContainer">
                <button class="filter-chip active" onclick="setCategory('All')">All</button>
                <button class="filter-chip" onclick="setCategory('Eminem')">Eminem</button>
                <button class="filter-chip" onclick="setCategory('Hip Hop History')">Classics</button>
                <button class="filter-chip" onclick="setCategory('Trending')">Trending</button>
            </div>

            <div class="grid" id="videoGrid">
                <!-- Data injected here via JS -->
            </div>
        </main>
    </div>

    <script>
        let fullLedger = [];
        let currentCategory = 'All';
        
        let favorites = JSON.parse(localStorage.getItem('axiom_favs')) || [];
        let history = JSON.parse(localStorage.getItem('axiom_history')) || [];

        function hashToGradient(hash) {
            const c1 = `#${hash.substring(0, 6)}`;
            const c2 = `#${hash.substring(6, 12)}`;
            return `linear-gradient(135deg, ${c1}, ${c2})`;
        }

        function timeSince(dateString) {
            const date = new Date(dateString);
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " yrs ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " mos ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hrs ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " mins ago";
            return "Just now";
        }

        function toggleFav(hash, event) {
            event.stopPropagation();
            if (favorites.includes(hash)) {
                favorites = favorites.filter(h => h !== hash);
            } else {
                favorites.push(hash);
            }
            localStorage.setItem('axiom_favs', JSON.stringify(favorites));
            applyFilters();
        }

        function recordHistory(hash) {
            if (!history.includes(hash)) {
                history.unshift(hash);
                if (history.length > 50) history.pop();
                localStorage.setItem('axiom_history', JSON.stringify(history));
            }
            alert("Block Hash Copied: \n" + hash);
        }

        function renderGrid(data) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-secondary); grid-column: 1/-1;">No records found in the ledger.</p>';
                return;
            }

            data.forEach(block => {
                const isFav = favorites.includes(block.hash);
                
                // Construct the background. If there's an image_url, overlay a dark gradient so text remains readable
                const hasImage = block.image_url && block.image_url.length > 5;
                const bgStyle = hasImage 
                    ? `background-image: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9)), url('${block.image_url}');` 
                    : `background: ${hashToGradient(block.hash)};`;
                
                // Small channel icon uses image if available, else first letter
                const channelIcon = hasImage 
                    ? `<div class="channel-icon" style="background-image: url('${block.image_url}')"></div>`
                    : `<div class="channel-icon">${block.source.charAt(0)}</div>`;

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => recordHistory(block.hash);
                
                card.innerHTML = `
                    <div class="thumbnail" style="${bgStyle}">
                        <div class="thumbnail-text">${block.topic}</div>
                        <div class="source-badge">${block.source}</div>
                    </div>
                    <div class="card-info">
                        ${channelIcon}
                        <div class="meta">
                            <div class="fact-title">${block.fact}</div>
                            <div class="fact-details">
                                Axiom Engine <span class="verified-icon">✔</span> • ${timeSince(block.timestamp)}
                            </div>
                            <div class="action-btns">
                                <button class="action-btn" onclick="toggleFav('${block.hash}', event)">
                                    ${isFav ? '⭐ Saved' : '☆ Save'}
                                </button>
                                <button class="action-btn" title="Block Hash: ${block.hash}">🔗 View Block</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = fullLedger;

            if (currentCategory === 'Favorites') {
                filtered = filtered.filter(b => favorites.includes(b.hash));
            } else if (currentCategory === 'History') {
                filtered = history.map(h => fullLedger.find(b => b.hash === h)).filter(b => b);
            } else if (currentCategory !== 'All') {
                filtered = filtered.filter(b => b.topic.includes(currentCategory));
            }

            if (query) {
                filtered = filtered.filter(b => b.fact.toLowerCase().includes(query) || b.topic.toLowerCase().includes(query));
            }

            renderGrid(filtered);
        }

        function setCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.sidebar-item').forEach(el => {
                el.classList.remove('active');
                if(el.innerText.includes(category) || (category === 'All' && el.innerText.includes('Home'))) {
                    el.classList.add('active');
                }
            });

            document.querySelectorAll('.filter-chip').forEach(el => {
                el.classList.remove('active');
                if(el.innerText === category || (category === 'All' && el.innerText === 'All')) {
                    el.classList.add('active');
                }
            });

            applyFilters();
        }

        async function init() {
            try {
                // Fetch JSON with a timestamp to bust the browser cache
                const response = await fetch('ledger.json?nocache=' + new Date().getTime());
                if(!response.ok) throw new Error("Ledger not found");
                fullLedger = await response.json();
                applyFilters();
            } catch (err) {
                console.error("Error fetching ledger:", err);
                document.getElementById('syncStatus').innerText = 'Offline';
                document.getElementById('syncStatus').style.color = 'red';
            }
        }

        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') applyFilters();
        });

        // --- PWA Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(error => {
                    console.error('Axiom Engine SW registration failed:', error);
                });
            });
        }

        init();
    </script>
</body>
</html>
