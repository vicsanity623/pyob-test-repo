name: Axiom Engine Ledger Fetch

on:
  schedule:
    - cron: '0 */4 * * *' # Runs automatically every 4 hours
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  build-ledger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 feedparser nltk
          python -m nltk.downloader punkt
          python -m nltk.downloader punkt_tab

      - name: Run Axiom Engine (Scrape, NLP & Seal)
        # This script will now run in a loop for ~2.8 hours before finishing
        run: python -u engine.py

      - name: Commit and Push Ledger
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ledger.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update cryptographically sealed ledger.json" && git push)
