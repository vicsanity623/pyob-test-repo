name: Axiom UAP OSINT Scraper

on:
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours
  workflow_dispatch: # Allows manual trigger button

permissions:
  contents: write

jobs:
  build-ledger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Scraper (Scan Reddit & 4chan for UFO Media)
        run: python -u engine.py

      - name: Commit and Push Ledger
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ledger.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: seal new UAP sightings into ledger" && git push)