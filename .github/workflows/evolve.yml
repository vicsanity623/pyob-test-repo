name: 🧠 Evolve Brain (Continuous)

on:
  schedule:
    - cron: '0 * * * *'       # Runs exactly at the top of every hour (e.g., 1:00, 2:00)
  workflow_dispatch:          # Manual trigger

concurrency:
  group: evolve-brain-loop
  cancel-in-progress: false   # Prevents overlap if manually triggered

permissions:
  contents: write             
  actions: write              

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 60       # Cap job at 1 hour

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy --quiet

      - name: Run headless evolution (55 minutes)
        # Runs for 55m, leaving 5 minutes for the server to boot, install, and commit
        run: python train_headless.py --minutes 55

      - name: Commit and Push updated brain
        id: commit_step
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evolved_core_brain.pkl brain.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            GEN=$(python -c "import json; d=json.load(open('brain.json')); print(d['meta']['generation'])")
            SCORE=$(python -c "import json; d=json.load(open('brain.json')); print(d['meta']['score'])")
            git commit -m "🧠 gen=${GEN} score=${SCORE} [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
